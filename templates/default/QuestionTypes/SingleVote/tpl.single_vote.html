<!-- BEGIN option -->
<div class="vote-option">
	<input type="{TYPE}" id="option-{OPTION_LETTER}" class="vote-checkbox" value="{OPTION_LETTER}" {CHECKBOX} link="{LINK}" name="vote-option" />
	<label for="option-{OPTION_LETTER}" class="vote-label">
		<div class="vote-question">
			<span class="label label-primary">{OPTION_LETTER}</span>
			<span>{TITLE}</span>
		</div>
		<div class="btn btn-block {BUTTON_STATE}">
			<span class="button-text">{ACTION}</span>
		</div>
	</label>
</div>
<!-- END option -->
